# Phase A benchmark harness — three containers sharing the host kernel so
# MPTCP and tc/netem are real. Containers are privileged + NET_ADMIN because
# netem qdiscs and the TUN device both require those caps.
#
# Network layout:
#   client (two NICs: eth-p1, eth-p2) ── wan bridge ── server
# Two user-defined bridges `benchp1` and `benchp2` represent the two upstream
# paths. The scenario scripts apply `tc qdisc netem` on the client-side veth
# of each bridge, which is what the kernel actually shapes.

services:
  server:
    build:
      context: ..
      dockerfile: bench/Dockerfile.hyperagg
    image: ratan-bench:latest
    container_name: bench-server
    hostname: bench-server
    cap_add: [NET_ADMIN, SYS_MODULE]
    sysctls:
      net.ipv4.ip_forward: "1"
      net.mptcp.enabled: "1"
    devices:
      - /dev/net/tun
    networks:
      benchp1: { ipv4_address: 10.80.1.2 }
      benchp2: { ipv4_address: 10.80.2.2 }
    environment:
      HYPERAGG_VPS_HOST: "0.0.0.0"
      HYPERAGG_KEY: "bench-nonproduction-key-do-not-reuse-00000000000000000000000="
    command: ["python", "-m", "hyperagg", "--mode", "server", "--no-tun", "--api-port", "8080"]
    ports:
      - "8080:8080"      # /api/state for scrape (host-side convenience)
      - "9999:9999/udp"  # tunnel port (see config.yaml vps.tunnel_port)
      - "5201:5201"      # iperf3 server, TCP + UDP
      - "5201:5201/udp"

  client:
    image: ratan-bench:latest
    container_name: bench-client
    hostname: bench-client
    depends_on: [server]
    cap_add: [NET_ADMIN, SYS_MODULE]
    sysctls:
      net.ipv4.ip_forward: "1"
      net.mptcp.enabled: "1"
    devices:
      - /dev/net/tun
    networks:
      benchp1: { ipv4_address: 10.80.1.3 }
      benchp2: { ipv4_address: 10.80.2.3 }
    environment:
      HYPERAGG_VPS_HOST: "10.80.1.2"
      HYPERAGG_KEY: "bench-nonproduction-key-do-not-reuse-00000000000000000000000="
    # run_all.sh execs commands into this container; default is a long sleep
    command: ["sleep", "infinity"]

networks:
  benchp1:
    driver: bridge
    ipam:
      config:
        - subnet: 10.80.1.0/24
  benchp2:
    driver: bridge
    ipam:
      config:
        - subnet: 10.80.2.0/24
